name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Linter (Flake8)
        run: flake8 .

      - name: Run Unit Tests
        run: python manage.py test
  deploy:
      needs: build-and-test
      runs-on: ubuntu-latest
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      steps:
        - name: Trigger Auto-deploy on Render
          run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}

        - name: Wait for deployment
          run: sleep 45 

        - name: Sanity Check (Weryfikacja)
          run: |
            HTTP_STATUS=$(curl -o /dev/null -s -w "%{http_code}\n" ${{ secrets.RENDER_APP_URL }})
            if [ "$HTTP_STATUS" -ne 200 ]; then
              echo "Sanity check failed! Otrzymano status: $HTTP_STATUS"
              exit 1
            fi
            echo "Sanity check passed with status 200 OK!"